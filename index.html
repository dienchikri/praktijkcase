<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CTA Section</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">

</head>

<body>

<section class="cta-section">

    <div class="cta-container">

        <div class="cta-top">

            <p class="cta-label">Label</p>

            <h2 class="cta-title">
                <span class="tt_commons_prodemi">Mandatory title about the </span>
                <span class="GT-Alpina-light">call-to-action</span>
                <span class="tt_commons_prodemi"> here</span>
            </h2>

            <p></p>
            <p></p>

            <p class="cta-description tt_commons_pro">
                Optional body copy goes here.
            </p>

            <p></p>

            <a href="#" class="cta-link tt_commons_pro">
                Optional button →
            </a>

        </div>



        <!-- card 1 -->
        <div class="cta-inner">

            <div class="cta-row">

                <a href="#" class="cta-card">

                    <div class="cta-image">

                        <img src="assets/img1.jpg" alt="CTA image">



                        <div class="cta-content">

                            <div>
                                <h3 class="cta-card-title tt_commons_prodemi">Title</h3>

                                <p class="cta-card-text tt_commons_pro">
                                    Supporting text about the call to action goes here.
                                </p>
                            </div>

                            <div class="cta-arrow">→</div>

                        </div>

                    </div>

                </a>



                <!-- CARD 2 -->
                <a href="#" class="cta-card">

                    <div class="cta-image">

                        <img src="assets/img2.jpg" alt="CTA image">



                        <div class="cta-content">

                            <div>
                                <h3 class="cta-card-title tt_commons_prodemi">Title</h3>

                                <p class="cta-card-text tt_commons_pro">
                                    Supporting text about the call to action goes here.
                                </p>
                            </div>

                            <div class="cta-arrow">→</div>

                        </div>

                    </div>

                </a>

            </div>

        </div>

    </div>

</section>

</body>
</html>
